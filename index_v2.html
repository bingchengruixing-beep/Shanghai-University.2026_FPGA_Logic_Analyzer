<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <title>简易逻辑分析仪 - 高级专业版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <link rel="stylesheet" href="https://unpkg.com/element-plus/theme-chalk/dark/css-vars.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
    <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #141414; color: #E5EAF3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #app { display: flex; height: 100vh; }

        /* 侧边栏及折叠动画 */
        .sidebar { background-color: #1D1E22; border-right: 1px solid #333; transition: width 0.3s ease; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar.expanded { width: 340px; }
        .sidebar.collapsed { width: 40px; }

        .sidebar-header { display: flex; justify-content: space-between; align-align: center; padding: 10px; background: #25272C; border-bottom: 1px solid #333; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; width: 340px; box-sizing: border-box; }

        /* 隐藏滚动条但保留功能 */
        .sidebar-content::-webkit-scrollbar { display: none; }

        /* 主工作区与工具栏 */

        .top-toolbar { height: 50px; background-color: #1D1E22; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .main-view { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; min-width: 0; min-height: 0; }
.plot-container { flex: 1; width: 100%; height: 100%; overflow: hidden; }

        /* Element-Plus 样式微调 */
        .el-collapse-item__header { background-color: transparent !important; color: #409EFF !important; font-weight: bold; font-size: 15px; }
        .el-collapse-item__wrap { background-color: transparent !important; }
        .el-form-item__label { color: #A3A6AD !important; padding-bottom: 2px !important; }
        .el-form-item { margin-bottom: 12px; }
        .el-checkbox { margin-right: 15px !important; }
        /* 自定义 uPlot 框选区样式：蓝色虚线边框与半透明背景 */
.u-select {
    background: rgba(64, 158, 255, 0.15) !important;
    border: 1px dashed #409EFF !important;
    box-sizing: border-box;
}
    </style>
</head>
<body>

<div id="app">
    <div :class="['sidebar', isSidebarOpen ? 'expanded' : 'collapsed']">
        <div class="sidebar-header">
            <span v-show="isSidebarOpen" style="color:#409EFF; font-weight:bold; font-size: 16px; line-height: 32px;">配置控制台</span>
            <el-button size="small" circle @click="isSidebarOpen = !isSidebarOpen">
                {{ isSidebarOpen ? '◀' : '▶' }}
            </el-button>
        </div>

        <div class="sidebar-content" v-show="isSidebarOpen">
            <el-collapse v-model="activePanels">

                <el-collapse-item title="⚙️ 串口设置 (硬件层)" name="1">
                    <el-form label-position="top" size="small">
                        <el-form-item label="目标串口">
                            <div style="display: flex; gap: 10px; width: 100%;">
                                <el-select v-model="selectedPort" placeholder="请选择或输入" filterable allow-create style="flex: 1;" :disabled="isRunning">
                                    <el-option v-for="port in portsList" :key="port" :label="port" :value="port"></el-option>
                                </el-select>
                                <el-button type="info" plain @click="fetchPorts" :disabled="isRunning">刷新</el-button>
                            </div>
                        </el-form-item>
                        <el-form-item label="波特率">
                            <el-select v-model="baudRate" style="width: 100%;" :disabled="isRunning">
                                <el-option label="115200 bps" value="115200"></el-option>
                                <el-option label="921600 bps" value="921600"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item>
                            <el-button type="primary" style="width: 48%;" @click="startCapture" :disabled="isRunning || !selectedPort">连接</el-button>
                            <el-button type="danger" style="width: 48%;" @click="stopCapture" :disabled="!isRunning">断开</el-button>
                        </el-form-item>
                    </el-form>
                </el-collapse-item>

                <el-collapse-item title="⚡ 触发设置 (信号捕获)" name="2">
                    <el-form label-position="top" size="small">
                        <el-form-item label="触发通道">
                            <el-select v-model="triggerCh" style="width: 100%;">
                                <el-option v-for="i in 8" :key="i-1" :label="'通道 ' + (i-1)" :value="i-1"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item label="触发沿">
                            <el-select v-model="triggerEdge" style="width: 100%;">
                                <el-option label="上升沿 (Rising)" value="rising"></el-option>
                                <el-option label="下降沿 (Falling)" value="falling"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-form>
                </el-collapse-item>

                <el-collapse-item title="📊 采集设置 (数据规模)" name="3">
                    <el-form label-position="top" size="small">
                        <el-form-item label="单次采集点数">
                            <el-select v-model="capturePoints" style="width: 100%;">
                                <el-option label="1024 样本" :value="1024"></el-option>
                                <el-option label="2048 样本" :value="2048"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item label="通道显示">
                            <div style="margin-bottom: 5px;">
                                <el-button size="small" type="primary" link @click="selectAllChannels(true)">全选</el-button>
                                <el-button size="small" type="primary" link @click="selectAllChannels(false)">全不选</el-button>
                            </div>
                            <el-checkbox-group v-model="visibleChannels" @change="updateChannelVisibility">
                                <el-checkbox v-for="i in 8" :key="i-1" :label="i-1">CH{{ i-1 }}</el-checkbox>
                            </el-checkbox-group>
                        </el-form-item>
                    </el-form>
                </el-collapse-item>

            </el-collapse>
        </div>
    </div>

    <div class="main-view">

        <div class="top-toolbar">
            <el-button type="warning" plain size="small" @click="resetView" icon="el-icon-refresh">
                🏠 重置视图
            </el-button>
            <el-divider direction="vertical"></el-divider>
            <span style="font-size: 13px; color: #909399;">
                🖱️ <b>左键拖拽</b>：框选放大 | <b>右键拖拽</b>：水平平移 | <b>滚轮</b>：定点缩放 | <b>双击</b>：恢复全览
            </span>
            <div style="flex: 1;"></div>
            <span style="font-size: 13px; color: #67C23A; font-family: monospace;" id="measure-result">
                等待框选测量...
            </span>
        </div>

        <div id="uplot-div" class="plot-container"></div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            // UI 控制状态
            const isSidebarOpen = ref(true);
            const activePanels = ref(['1', '3']); // 默认展开串口和采集

            // 硬件通信状态
            const portsList = ref([]);
            const selectedPort = ref('');
            const baudRate = ref('115200');
            const isRunning = ref(false);

            // 触发与采集状态
            const triggerCh = ref(0);
            const triggerEdge = ref('rising');
            const capturePoints = ref(2048);
            const visibleChannels = ref([0, 1, 2, 3, 4, 5, 6, 7]);

            let ws = null;
            let uplotInst = null;
            const API_BASE = 'http://127.0.0.1:8000';
            const WS_BASE = 'ws://127.0.0.1:8000';

            // 1. 全选/全不选逻辑
            const selectAllChannels = (isAll) => {
                visibleChannels.value = isAll ? [0, 1, 2, 3, 4, 5, 6, 7] : [];
                updateChannelVisibility();
            };

            // 2. 更新底层画布的通道可见性
            const updateChannelVisibility = () => {
                if(!uplotInst) return;
                for(let i = 0; i < 8; i++) {
                    // uPlot Series 索引 0 是 X 轴，CH0-CH7 是 1-8
                    const isVisible = visibleChannels.value.includes(i);
                    uplotInst.setSeries(i + 1, { show: isVisible });
                }
            };

            // 3. 视口重置工具
            const resetView = () => {
                if(!uplotInst) return;
                uplotInst.setScale('x', { min: 0, max: capturePoints.value });
                uplotInst.setScale('y', { min: -1, max: 17 }); // 【视觉修正】：留出底部空白
            };

            // HTTP: 获取端口
            const fetchPorts = async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/ports`);
                    const data = await res.json();
                    if(data.status === "success") {
                        portsList.value = data.data;
                        if(portsList.value.length > 0 && !selectedPort.value) {
                            selectedPort.value = portsList.value[0];
                        }
                        ElementPlus.ElMessage.success('端口刷新成功');
                    }
                } catch (e) {
                    ElementPlus.ElMessage.error('无法连接后端 API');
                }
            };

            // HTTP: 启动连接
            const startCapture = async () => {
                if(!selectedPort.value) return;
                try {
                    const res = await fetch(`${API_BASE}/api/connect?port=${selectedPort.value}&baudrate=${baudRate.value}`, {method: 'POST'});
                    const data = await res.json();
                    if(data.status === "success") {
                        isRunning.value = true;
                        ElementPlus.ElMessage.success(data.msg);
                        initWebSocket();
                    } else {
                        ElementPlus.ElMessage.error(data.msg);
                    }
                } catch (e) {
                    ElementPlus.ElMessage.error('启动失败');
                }
            };

            // HTTP: 断开
            const stopCapture = async () => {
                try {
                    await fetch(`${API_BASE}/api/disconnect`, {method: 'POST'});
                    isRunning.value = false;
                    if(ws) ws.close();
                    ElementPlus.ElMessage.warning('物理连接已断开');
                } catch (e) {}
            };

            // WebSocket 接收
            const initWebSocket = () => {
                ws = new WebSocket(`${WS_BASE}/ws/data`);
                ws.onmessage = (event) => {
                    const packet = JSON.parse(event.data);
                    if(packet.type === "waveform" && uplotInst) {
                        const bitMatrix = packet.data;
                        const depth = bitMatrix[0].length;

                        let x_data = Array.from({length: depth}, (_, i) => i);
                        let plot_data = [x_data];

                        for(let ch=0; ch<8; ch++) {
                            plot_data.push(bitMatrix[ch].map(val => val + (ch * 2)));
                        }
                        uplotInst.setData(plot_data);
                    }
                };
            };

            // 初始化画布
            const initPlot = () => {
                const colors = ['#F56C6C', '#E6A23C', '#5CB87A', '#1989FA', '#67C23A', '#909399', '#D4A4EB', '#00CED1'];
                let seriesConfig = [ {} ];
                let axesConfig = [ { stroke: "#c0c0c0", grid: { stroke: "#333", width: 1 } } ];

                let yTicks = [];
                for(let i=0; i<8; i++) {
                    yTicks.push([i * 2 + 0.5, `CH${i}`]);
                    seriesConfig.push({
                        label: `CH${i}`,
                        stroke: colors[i],
                        width: 2,
                        paths: uPlot.paths.stepped({align: 1})
                    });
                }

                axesConfig.push({
                    stroke: "#c0c0c0",
                    grid: { stroke: "#333", width: 1 },
                    splits: yTicks.map(t => t[0]),
                    values: (u, vals) => vals.map(v => {
                        let match = yTicks.find(t => t[0] === v);
                        return match ? match[1] : '';
                    })
                });

                const opts = {
                    width: document.getElementById('uplot-div').clientWidth,
                    height: document.getElementById('uplot-div').clientHeight,
                    padding: [10, 20, 10, 20],
                    scales: {
                        x: { time: false, min: 0, max: capturePoints.value },
                        y: { range: [-1, 17] } // 【核心修正】：留出底部边距
                    },
                    series: seriesConfig,
                    axes: axesConfig,
                    cursor: { sync: { key: "moo" } },
                    select: { show: true },
                    hooks: {
                        setSelect: [
                            (u) => {
                                const min = u.posToVal(u.select.left, 'x');
                                const max = u.posToVal(u.select.left + u.select.width, 'x');
                                const deltaSamples = Math.abs(max - min);
                                if(deltaSamples > 0) {
                                    const Ts_us = 1.0;
                                    const deltaT_us = deltaSamples * Ts_us;
                                    const freq_kHz = 1000 / deltaT_us;
                                    document.getElementById('measure-result').innerHTML =
                                        `📏 ΔX: ${deltaSamples.toFixed(1)} 样本 | ΔT: ${deltaT_us.toFixed(2)} μs | Freq: ${freq_kHz.toFixed(2)} kHz`;
                                }
                            }
                        ]
                    }
                };

                let initData = [Array.from({length: capturePoints.value}, (_, i) => i)];
                for(let i=0; i<8; i++) initData.push(Array(capturePoints.value).fill(null));

                uplotInst = new uPlot(opts, initData, document.getElementById('uplot-div'));

                // 【抢修版】：避免死循环的 ResizeObserver
const mainViewDiv = document.querySelector('.main-view');
const plotContainerDiv = document.getElementById('uplot-div');

const resizeObserver = new ResizeObserver(() => {
    // 使用 requestAnimationFrame 确保在浏览器下一帧重绘前执行，彻底切断同步死循环
    window.requestAnimationFrame(() => {
        if (uplotInst && plotContainerDiv.clientWidth > 0) {
            // 直接读取被 flex 布局严格卡死的容器真实宽高
            uplotInst.setSize({
                width: plotContainerDiv.clientWidth,
                height: plotContainerDiv.clientHeight
            });
        }
    });
});

// 监听外层容器，而不是直接监听会被 canvas 撑大的内层容器
resizeObserver.observe(mainViewDiv);

                // 注入之前完成的滚轮定点缩放逻辑
                const over = uplotInst.over;
                over.addEventListener("wheel", (e) => {
                    e.preventDefault();
                    const u = uplotInst;
                    let xMin = u.scales.x.min, xMax = u.scales.x.max;
                    const rect = over.getBoundingClientRect();
                    const xCursor = u.posToVal(e.clientX - rect.left, 'x');
                    const zoomFactor = e.deltaY < 0 ? 0.85 : 1.15;
                    let newMin = xCursor - (xCursor - xMin) * zoomFactor;
                    let newMax = xCursor + (xMax - xCursor) * zoomFactor;

                    if (newMin < 0) newMin = 0;
                    if (newMax > capturePoints.value) newMax = capturePoints.value;
                    if (newMax - newMin < 10) return;

                    u.setScale('x', { min: newMin, max: newMax });
                }, { passive: false });

                over.addEventListener("dblclick", resetView);
            };

            onMounted(() => {
                initPlot();
                fetchPorts();
            });

            return {
                isSidebarOpen, activePanels, portsList, selectedPort, baudRate, isRunning,
                triggerCh, triggerEdge, capturePoints, visibleChannels,
                fetchPorts, startCapture, stopCapture, selectAllChannels, updateChannelVisibility, resetView
            };
        }
    }).use(ElementPlus).mount('#app');
</script>

</body>
</html>
